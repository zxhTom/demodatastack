version: '3.8'

services:
  postgres-primary:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres-primary
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: edumanage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: replicator123
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./docker/postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edumanage"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres-replica:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres-replica
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: edumanage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      PGUSER: postgres
      PGPASSWORD: postgres123
      PRIMARY_HOST: postgres-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator123
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./docker/postgres/replica/setup.sh:/docker-entrypoint-initdb.d/setup.sh:ro
    entrypoint: ["/bin/bash", "/docker-entrypoint-initdb.d/setup.sh"]
    networks:
      - app-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@postgres-primary:5432/edumanage
      REDIS_URL: redis://redis:6379/0
      # Redis 内部容器间通信仍使用 6379，宿主机映射到 6380
      SECRET_KEY: edu-manage-secret-key-change-in-production-2024
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    networks:
      - app-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  cdc-collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdc-collector
    command: ["python", "-m", "app.cdc.collector"]
    environment:
      REDIS_URL: redis://redis:6379/0
      CDC_PG_DSN: host=postgres-primary port=5432 dbname=edumanage user=postgres password=postgres123
    networks:
      - app-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-primary-data:
    driver: local
  postgres-replica-data:
    driver: local
