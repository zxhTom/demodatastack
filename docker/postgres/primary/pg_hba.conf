# =============================================================================
# PostgreSQL 客户端认证配置 (pg_hba.conf)
# 教务管理系统主库
# =============================================================================
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD
# -----------------------------------------------------------------------------

# 本地 Unix socket 连接 - 信任（容器内部使用）
local   all             all                                     trust

# IPv4 本地回环连接
host    all             all             127.0.0.1/32            md5

# IPv6 本地回环连接
host    all             all             ::1/128                 md5

# 所有主机的普通数据库连接（md5 认证）
host    all             all             0.0.0.0/0               md5

# 流复制连接 - 允许 replicator 用户从任何地址连接
# 用于 postgres-replica 节点的流复制
host    replication     replicator      0.0.0.0/0               md5

# 允许 postgres 超级用户进行复制（Debezium 使用）
host    replication     postgres        0.0.0.0/0               md5
