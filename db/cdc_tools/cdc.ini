# CDC 工具配置模板。复制为你自己的文件（如 my_source.ini）后按需修改。
# 一份配置文件对应「一个源库 + 一批表」。要监听多个 PostgreSQL 实例，
# 每个实例各写一份配置（tag 不同），可以共用同一个 Redis Stream，
# 事件里的 source 字段会标出来自哪个实例。

[source]
host     = 172.17.182.123
port     = 5432
dbname   = eco_ma
user     = hes
password = 7L2wYCDWLQdqPr4bNsYBMr5nwutckP8Q
# 这个源的标识，写入每条事件的 source 字段。不填默认用 dbname。
# 多个 PG 实例共用同一个 Redis Stream 时，靠这个字段区分来源。
tag      = mydb_prod

[cdc]
# 要监听的表，逗号分隔，不带 schema 默认按 public 处理
tables             = c_meter,r_tmnl_run,d_tmnl_online,sys_fep_comm_log,d_task_item_comm_log_rel,d_task_item,d_alarm_event,d_power_failure_event_log,g_tran
publication        = cdc_pub
# 不填默认 cdc_slot_<tag>
slot                = cdc_slot_mydb_prod
# 采集器心跳写入 Redis 的间隔（秒），verify/status 靠它判断采集器是否存活
heartbeat_interval  = 15

[redis]
url             = redis://:123456@172.17.182.134:6379/0
stream_key      = cdc:events
# Stream 最大长度（近似），超过后旧消息会被裁剪，是 verify 检测的裁剪丢失来源
stream_maxlen   = 20000
# 以下几项不填会按 tag 自动生成，一般不需要改
; seq_key            = cdc:seq:mydb_prod
; heartbeat_key       = cdc:heartbeat:mydb_prod
; checkpoint_prefix   = cdc:checkpoint:mydb_prod
; verify_cursor_key   = cdc:verify:cursor:mydb_prod
; last_seq_key        = cdc:verify:lastseq:mydb_prod

[verify]
# 需要做行数核对（INSERT/DELETE 净增量 vs 实际行数）的表，逗号分隔。
# 留空则跳过行数核对（避免对大表做高频 COUNT(*)），可用 verify --full 临时全表核对。
count_check_tables = public.c_meter, public.r_tmnl_run
# WAL 积压超过多少 MB 报 WARN
lag_warn_mb        = 1024
