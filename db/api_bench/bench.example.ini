# HES 接口压测配置。复制为 bench.ini 后修改；bench.ini 已被 .gitignore 排除，
# 认证头（token/cookie）不会进版本库。
#
# 压测模型：为每个接口指定一个「测试集」= 一个电表集合 + 一个时间范围。
# 每一轮从电表集合里【随机】抽若干个电表、在时间范围内【随机】取一段子窗口，
# 组成请求参数去压测。只测这里写了 [段] 的接口——不想测某个接口就删掉它的段。

[api]
# 服务访问地址（不带末尾斜杠，也不含 /hes-web-api，那个由下面 context_path 统一加）
base_url = http://192.168.1.100:8080
# 四个接口共用的公共前缀（网关 context path）。默认 /hes-web-api，四个接口都会自动带上，
# 不用在每个接口里各写一遍。若你们的网关前缀不同就改这里；不需要前缀就填空。
context_path = /hes-web-api
# 单次请求超时秒数。注意：curl 默认不超时，脚本会。转超表【前】的普通表大范围
# 查询可能很慢，60s 容易超时被判失败——测普通表时可以调大（如 300）。超时本身
# 也是有意义的压测结果（说明该查询在当前表结构下太慢）。
timeout  = 120

[headers]
# 认证头原样写在这里（key 大小写保留），按你们实际的认证方式填
# 脚本已默认带上 User-Agent: curl/8.4.0 和 Accept: */*（对齐 curl，避免被网关拦），
# 需要覆盖就在这里显式写 User-Agent = ... / Accept = ...
# Authorization = Bearer eyJhbGciOi...
# Cookie = SESSION=xxxx

[bench]
# 所有接口共用的默认值，可在各接口段里单独覆盖
rounds           = 20        # 每个接口随机跑多少轮（每轮参数各不相同）
repeat           = 3         # 每轮同参数重复请求几次（取时延分布）
meters_per_round = 2-20      # 每轮从电表集合里随机抽多少个电表（闭区间随机；写 10 表示固定 10 个）
window_days      = 1-7       # 每轮随机时间子窗口的跨度天数（闭区间随机）
seed             = 42        # 随机种子：同种子=同一批随机参数。转换前后用同一种子跑即可逐轮对比
delay            = 0         # 每次请求之间的间隔秒数。连续猛打导致后端 503 时调大（如 0.5、1）

# ── 曲线数据接口 ──
[curve]
# 电表集合三种写法：
#   file:curve_meters.txt = 用 `api_bench.py meters` 分析出的"命中数据多"的活跃电表
#                           （强烈推荐——抽到空电表查询秒回，测不出真实耗时）
#   auto:N                = 从 c_meter 取前 N 个真实 ID（不保证有数据）
#   14232,15831,15833     = 显式列表
meter_pool = auto:50
# 时间范围（每轮在此范围内随机取子窗口），格式 YYYY-MM-DD 或 YYYY-MM-DD HH:MM:SS
time_start = 2025-01-01
time_end   = 2025-06-30
# groupIds 按需求保持不变
group_ids  = 40930000011
# 可选：覆盖 [bench] 默认，比如曲线数据重，轮数少点、电表少点
# rounds           = 15
# meters_per_round = 2-10

# ── 事件数据接口 ──
[event]
meter_pool = auto:50
time_start = 2025-01-01
time_end   = 2026-07-01

# ── 告警事件接口（只有时间范围，没有电表参数）──
[alarm]
time_start = 2026-01-01
time_end   = 2026-07-01

# ── 通讯日志接口（参数固定，测重复请求基线）──
[commlog]
rounds = 5
