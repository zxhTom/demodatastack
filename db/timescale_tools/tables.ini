# ============================================================
# 表转换清单（合并版）：普通表 <-> TimescaleDB 超表 通用
# 供 table_convert.py 的 status / to-hyper / to-plain 使用。
#
# 每个 [section] 是一张表，group 用于 --group 过滤（event/curve/log）。
# 字段说明见 README.md。
# ============================================================

# ── 事件表（10 张） ────────────────────────────────────────
[d_alarm_event]
group          = event
time_column    = alarm_time
chunk_interval = 30 days
segmentby      = device_id
compress_after = 90 days
# 主键原本只有 content_id、不含分区列 alarm_time，重建成复合主键（超表要求唯一约束含分区列）
pk_columns     = content_id, alarm_time
# idx_pk_d_alarm_event 是和主键重复的冗余独立唯一索引，同样缺 alarm_time；
# 转换后不重建它（主键已保证 content_id 唯一，原表备份 _pg_old 仍保留），否则同样报
# "cannot create a unique index without the column alarm_time"
drop_indexes   = idx_pk_d_alarm_event

[d_communication_event_log]
