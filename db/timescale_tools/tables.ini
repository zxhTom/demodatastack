# ── 曲线表（12 张） ────────────────────────────────────────
# 分区列用 data_date 而不是 coll_time：这些表的主键是
# (mp_id, data_date, data_time, profile_id, supply_id)，TimescaleDB
# 要求分区列必须出现在表的主键/唯一约束里，data_date 满足、coll_time 不满足。
# 如果你的库里这批表主键结构不同，用 status 命令先确认，需要的话给该表加
# pk_columns 配置重建主键（用法见下面 sys_fep_comm_log 的例子）。
[d_load_voltage]
group          = curve
time_column    = data_date
chunk_interval = 7 days
segmentby      = mp_id
compress_after = 180 days

