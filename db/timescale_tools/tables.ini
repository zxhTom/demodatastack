# ── 通讯日志表（1 张） ─────────────────────────────────────
# 这张表的原始主键是 comm_log_id（不含时间列），必须配 pk_columns
# 让 to-hyper 重建成含时间列的复合主键，否则 create_hypertable 会失败。
# pk_columns 只在 to-hyper 方向生效；to-plain 转回普通表时会原样保留
# 这个复合主键（不会恢复成原来的单列主键，但主键在业务上依然唯一有效）。
[sys_fep_comm_log]
group          = log
time_column    = start_time
chunk_interval = 1 day
segmentby      = device_id,device_type
orderby        = start_time DESC, comm_log_id
compress_after = 7 days
pk_columns     = comm_log_id, start_time
