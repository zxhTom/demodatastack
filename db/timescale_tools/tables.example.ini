# ============================================================
# 表转换清单 —— 描述哪些普通表要转成 TimescaleDB 超表(hypertable)
#
# 用法：
#   python3 convert_to_timescale.py tables.example.ini
#
# ⚠️ 脚本不会改原表：它会新建一张 <原表名>_ts 的超表（后缀可用 --suffix 改），
#    把原表结构+数据拷过去，原表原封不动保留，方便两张表对比。
#
# 格式说明（INI）：每个 [section] 就是一张要转换的表，section 名 = 表名。
# 支持 schema：写成 [public.sensor_data] 即可。
#
# 字段一览（只有 time_column 必填，其余可选）：
#   time_column        必填。分区列（时间维度），必须是 timestamp/timestamptz/date
#                      或 整数(bigint，配合自定义 now 函数时)。这是 hypertable 的主分区键。
#   chunk_interval     可选。每个 chunk 覆盖的时间范围，默认 "7 days"。
#                      经验值：让单个 chunk 数据量 ≈ 内存的 25%。高频写入用小区间。
#   segmentby          可选。开启列存压缩时的分段列（compress_segmentby）。
#                      通常填查询里最常带的过滤/分组列，如 device_id。填了即开启压缩。
#   orderby            可选。压缩排序列（compress_orderby），默认用 "time_column DESC"。
#                      影响压缩比和范围扫描效率，一般填时间列。
#   compress_after     可选。压缩策略：数据存在超过该时长后自动压缩，如 "30 days"。
#                      需配合 segmentby 使用；不填则只开压缩能力、不自动执行。
#   space_partition    可选。二级（空间）分区列，多节点/并行场景才需要。
#   number_partitions  可选。space_partition 的分区数，填了 space_partition 时建议设。
#   migrate_data       可选，默认 true。是否把原表数据拷贝进新超表。
#                      false 则只建空的超表结构，不灌数据。
#   target             可选。直接指定新超表的表名（覆盖默认的「原表名+后缀」）。
# ============================================================

# 示例 1：最小配置，只指定时间分区列
[sensor_data]
time_column = ts

# 示例 2：高频写入 + 开启压缩 + 自动压缩策略
[device_metrics]
time_column     = recorded_at
chunk_interval  = 1 day
segmentby       = device_id
orderby         = recorded_at DESC
compress_after  = 7 days

# 示例 3：带 schema、二级空间分区
[public.app_logs]
time_column       = log_time
chunk_interval    = 12 hours
segmentby         = service
space_partition   = service
number_partitions = 4
migrate_data      = true
