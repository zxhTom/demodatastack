# ============================================================
# 电能表曲线表迁移清单（seed_meter_data.py 涉及的 12 张表）
#
# 用法：
#   python3 convert_to_timescale.py tables_meter_curve.ini --new-table no
#   python3 convert_to_timescale.py tables_meter_curve.ini --new-table no --dry-run
#
# 分区策略：
#   time_column    = coll_time（timestamp，15 分钟粒度）
#   chunk_interval = 7 days（约 21K 设备 × 96 点 × 7 天 ≈ 1400 万行/chunk）
#   segmentby      = mp_id（最常见查询过滤列）
#   compress_after = 30 days
# ============================================================

[d_load_voltage]
time_column    = coll_time
chunk_interval = 7 days
segmentby      = mp_id
orderby        = coll_time DESC
compress_after = 30 days

